name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
      - run: cmake --build build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - run: sudo apt-get update && sudo apt-get install -y clang-tidy
      - run: run-clang-tidy -p build -quiet

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build
      - run: tar czf drip-${{ github.ref_name }}-linux.tar.gz -C build drip
      - id: changelog
        run: |
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --format="- %s" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          files: drip-*.tar.gz
          body: ${{ steps.changelog.outputs.changelog }}
